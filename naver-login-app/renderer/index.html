<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>네이버 연결</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      height: 300px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #03c75a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .app-name {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
    }

    /* ── 콘텐츠 ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
    }

    .screen { display: none; width: 100%; text-align: center }
    .screen.active { display: block }

    /* 토큰 입력 */
    .desc {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 8px;
      user-select: text;
    }

    input[type="text"]:focus { border-color: #03c75a }
    input[type="text"]::placeholder { color: #94a3b8 }

    /* 상태 표시 */
    .icon { font-size: 32px; margin-bottom: 8px; line-height: 1 }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin { to { transform: rotate(360deg) } }

    .msg {
      font-size: 12px;
      color: #475569;
      line-height: 1.6;
      white-space: pre-line;
    }

    .msg.ok  { color: #16a34a }
    .msg.err { color: #dc2626 }

    /* 버튼 */
    .btn {
      display: block;
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Malgun Gothic', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .btn:hover  { opacity: 0.85 }
    .btn:active { opacity: 0.7 }
    .btn-green { background: #03c75a; color: #fff }
    .btn-gray  { background: #e2e8f0; color: #475569 }
  </style>
</head>
<body>

  <header>
    <div class="logo">N</div>
    <span class="app-name">네이버 연결</span>
  </header>

  <main>

    <!-- 토큰 입력 -->
    <div id="s-input" class="screen">
      <p class="desc">사이트에서 복사한 토큰을 붙여넣고 시작하세요.</p>
      <input id="token" type="text" placeholder="토큰 붙여넣기 (Ctrl+V)" autocomplete="off" spellcheck="false" />
      <button class="btn btn-green" id="btn-start">시작하기</button>
    </div>

    <!-- 로딩 / 상태 -->
    <div id="s-status" class="screen">
      <div id="icon"></div>
      <p id="msg" class="msg"></p>
      <button class="btn btn-green" id="btn-close" style="display:none">닫기</button>
      <button class="btn btn-gray"  id="btn-retry" style="display:none">다시 시도</button>
    </div>

  </main>

  <script>
    console.log('renderer script 시작')
    const sInput  = document.getElementById('s-input')
    const sStatus = document.getElementById('s-status')
    const tokenEl = document.getElementById('token')
    const btnStart = document.getElementById('btn-start')
    const iconEl  = document.getElementById('icon')
    const msgEl   = document.getElementById('msg')
    const btnClose = document.getElementById('btn-close')
    const btnRetry = document.getElementById('btn-retry')

    function show(name) {
      sInput.classList.toggle('active', name === 'input')
      sStatus.classList.toggle('active', name === 'status')
    }

    function setStatus(iconHtml, text, cls) {
      iconEl.innerHTML = iconHtml
      msgEl.textContent = text
      msgEl.className = 'msg' + (cls ? ' ' + cls : '')
      btnClose.style.display = 'none'
      btnRetry.style.display = 'none'
    }

    window.api.onState(({ state, message }) => {
      switch (state) {
        case 'input':
          show('input')
          tokenEl.focus()
          break

        case 'loading':
          show('status')
          setStatus('<div class="spinner"></div>', message)
          break

        case 'success':
          show('status')
          setStatus('<div class="icon">✅</div>', message, 'ok')
          btnClose.style.display = 'block'
          break

        case 'error':
          show('status')
          setStatus('<div class="icon">❌</div>', message, 'err')
          btnRetry.style.display = 'block'
          break
      }
    })

    btnStart.addEventListener('click', () => {
      const t = tokenEl.value.trim()
      if (t) window.api.submitToken(t)
    })

    tokenEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnStart.click()
    })

    btnClose.addEventListener('click', () => window.api.closeWindow())

    btnRetry.addEventListener('click', () => {
      show('input')
      tokenEl.value = ''
      tokenEl.focus()
    })
  </script>
</body>
</html>
